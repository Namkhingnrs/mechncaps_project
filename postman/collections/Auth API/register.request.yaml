$kind: http-request
name: Register
method: POST
url: 'http://localhost:3000/auth/register'
order: 1000
auth:
  type: noauth
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "username": "johndoe",
      "email": "johndoe@example.com",
      "password": "secret123"
    }
